services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiremind-app
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - hiremind_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - init
    env_file:
      - .env
    volumes:
      - hiremind_data:/app/data
    command: ["npm", "run", "seed"]
    restart: "no"

volumes:
  hiremind_data:
