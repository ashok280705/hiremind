services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hiremind:latest
    container_name: hiremind-app
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - init
    env_file:
      - .env
    command: ["npx", "tsx", "seed.ts"]
    restart: "no"
